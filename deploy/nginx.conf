# ============================================================
# nginx конфиг для antinarkologia.ru
# Копировать в: /etc/nginx/sites-available/antinarkologia
# Активировать: ln -s /etc/nginx/sites-available/antinarkologia /etc/nginx/sites-enabled/
# ============================================================

server {
    listen 80;
    # Работает по IP, субдомену и основному домену
    server_name antinarkologia.ru www.antinarkologia.ru new.antinarkologia.ru 195.208.118.112 _;

    # Certbot будет заменять этот блок на HTTPS-редирект
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;

        # Отключить буферизацию для Server-Sent Events (если нужно)
        proxy_buffering off;
    }

    # Статические файлы — кешировать напрямую nginx'ом
    location /static/ {
        alias /var/www/antinarkologia/public/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Service Worker не кешируем
    location /static/sw.js {
        alias /var/www/antinarkologia/public/static/sw.js;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Favicon
    location = /favicon.ico {
        alias /var/www/antinarkologia/public/favicon.ico;
        expires 7d;
        access_log off;
    }

    # robots.txt
    location = /robots.txt {
        alias /var/www/antinarkologia/public/robots.txt;
        access_log off;
    }
}

# HTTPS-блок добавляется certbot автоматически
