<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Фон: скруглённый квадрат цвета navy -->
  <rect width="32" height="32" rx="7" fill="#1a2e4a"/>
  <!-- Буква А: две наклонные стойки + перекладина -->
  <!-- Левая стойка А -->
  <polygon points="4,27 8,27 16,6 12,6" fill="#ffffff"/>
  <!-- Правая стойка А -->
  <polygon points="28,27 24,27 16,6 20,6" fill="#ffffff"/>
  <!-- Перекладина А (янтарная — акцентная) -->
  <rect x="10.5" y="17.5" width="11" height="3" fill="#e8a020"/>
  <!-- Средняя перемычка Н (белая, между стойками А) -->
  <rect x="10.5" y="12" width="11" height="2.5" fill="#ffffff" opacity="0.55"/>
</svg>
