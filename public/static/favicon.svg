<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Белый фон -->
  <rect width="64" height="64" fill="#ffffff"/>

  <!--
    БУКВА H — тёмно-синяя (задний слой)
    Две вертикальные стойки + горизонтальная перемычка
    Стойки чуть скошены для динамики
  -->
  <!-- Левая стойка H -->
  <polygon points="5,6  16,6  20,58  9,58" fill="#1a3056"/>
  <!-- Правая стойка H -->
  <polygon points="44,6  55,6  59,58  48,58" fill="#1a3056"/>
  <!-- Перемычка H (будет частично перекрыта А) -->
  <rect x="16" y="28" width="32" height="10" fill="#1a3056"/>

  <!--
    БУКВА А — оранжевая (передний слой, перевёрнутая)
    Широкий V: две диагональные ножки сходятся внизу в центре
    Горизонтальная перекладина на ~40% высоты от верха
    Форма по образцу логотипа: толстые скошенные ноги
  -->
  <!-- Левая ножка А -->
  <polygon points="6,6  19,6  36,58  23,58" fill="#e07b15"/>
  <!-- Правая ножка А -->
  <polygon points="45,6  58,6  41,58  28,58" fill="#e07b15"/>
  <!-- Перекладина А -->
  <polygon points="18,36  46,36  43,46  21,46" fill="#e07b15"/>
</svg>
