<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Панель консультанта — АНТИНаркология</title>
<link rel="stylesheet" href="/static/app.css">
</head>
<body>

<div class="app-shell">

  <header class="topbar">
    <div class="topbar-logo">АНТИ<span style="color:var(--c-accent)">Нарко</span>логия</div>
    <div style="margin-left:8px;font-size:13px;padding:3px 10px;background:#e8f0f7;border-radius:20px;color:var(--c-primary);font-weight:600">
      Панель консультанта
    </div>
    <div class="topbar-user">
      <span id="topbar-name">—</span>
      <button class="btn btn-outline btn-sm" onclick="Auth.logout()">Выйти</button>
    </div>
  </header>

  <nav class="sidebar" id="sidebar">
    <button class="sidebar-item active" data-page="dashboard">
      <span class="icon">📊</span> Обзор
    </button>
    <button class="sidebar-item" data-page="bookings">
      <span class="icon">📋</span> Записи
    </button>
    <button class="sidebar-item" data-page="slots">
      <span class="icon">🗓</span> Расписание
    </button>
    <button class="sidebar-item" data-page="support">
      <span class="icon">🤝</span> Сопровождение
    </button>
    <div class="sidebar-spacer"></div>
    <div class="sidebar-section">Настройки</div>
    <button class="sidebar-item" data-page="profile">
      <span class="icon">⚙️</span> Профиль
    </button>
    <button class="sidebar-item" onclick="Auth.logout()" style="color:var(--c-muted)">
      <span class="icon">🚪</span> Выйти
    </button>
  </nav>

  <main class="main-content" id="main"></main>
</div>

<div id="modal-root"></div>

<script src="/static/api.js"></script>
<script src="/static/consultant.js"></script>
</body>
</html>
